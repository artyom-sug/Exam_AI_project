<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экзамен | Система оценивания знаний</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/exam.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="exam-container">
  <div class="exam-header">
    <div class="exam-title">
      <h1>Экзамен</h1>
      <div class="student-info" id="studentInfo"></div>
    </div>
    <div class="timer">
      <span>Осталось времени:</span>
      <span id="timerDisplay">00:00:00</span>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">Заполнено: 0 из ? вопросов</div>
  </div>

  <div class="questions-container" id="questionsContainer">
    <div class="loading-spinner"></div>
    <p>Загрузка вопросов...</p>
  </div>

  <div class="actions">
    <button class="btn btn-primary btn-finish" id="finishExamBtn" type="button">
      ✅ Завершить экзамен
    </button>
  </div>
</div>

<script src="/js/exam.js"></script>
</body>
</html>
